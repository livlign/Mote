<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Geist:wght@500;800&family=Geist+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #FFFFFF;
    color: #000000;
    font-family: "Geist", system-ui, sans-serif;
    position: relative;
    padding: 80px;
    overflow: hidden;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 16px;
    position: absolute;
    top: 80px;
    left: 80px;
  }
  .mark {
    width: 38px;
    height: 26px;
    display: block;
    transform: translateY(2px);
  }
  .brand .name {
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 144, "wght" 500;
    font-size: 44px;
    letter-spacing: -0.04em;
    color: #000000;
    line-height: 1;
  }
  .center {
    position: absolute;
    top: 50%;
    left: 80px;
    transform: translateY(-50%);
    max-width: 1040px;
  }
  .headline {
    font-family: "Geist", sans-serif;
    font-weight: 800;
    font-size: 140px;
    line-height: 0.95;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    color: #000000;
    margin-bottom: 36px;
  }
  .sub {
    font-family: "Geist", sans-serif;
    font-weight: 500;
    font-size: 36px;
    line-height: 1.3;
    color: rgba(0,0,0,0.55);
  }
  .url {
    position: absolute;
    bottom: 88px;
    left: 80px;
    font-family: "Fraunces", Georgia, serif;
    font-variation-settings: "opsz" 144, "wght" 500;
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.025em;
    color: rgba(0,0,0,0.55);
    line-height: 1.2;
  }
  .cta {
    position: absolute;
    bottom: 76px;
    right: 80px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #0033CC;
    color: #FFFFFF;
    font-family: "Geist", sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 16px 24px;
    line-height: 1;
  }
  .cta .arrow { font-weight: 500; }
  .cta .dot { opacity: 0.55; margin: 0 4px; }
  .rule {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2px;
    background: #000000;
  }
</style>
</head>
<body>
  <div class="brand">
    <svg class="mark" viewBox="0 0 38 26" aria-hidden="true">
      <circle cx="19" cy="6"  r="4" fill="#0033CC"/>
      <circle cx="11" cy="20" r="4" fill="#0033CC"/>
      <circle cx="27" cy="20" r="4" fill="#0033CC"/>
    </svg>
    <div class="name">mote</div>
  </div>
  <div class="center">
    <div class="headline">Today,<br>in a Word.</div>
    <div class="sub">What's the world thinking today?</div>
  </div>
  <div class="url">mote.day</div>
  <div class="cta">See today's word <span class="dot">·</span> Share yours <span class="arrow">→</span></div>
  <div class="rule"></div>
</body>
</html>
