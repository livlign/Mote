<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mote — Today, in a Word</title>
<meta property="og:title" content="Mote — Today, in a Word" />
<meta property="og:description" content="One word a day. The world's words, set big. Resets at midnight UTC." />
<meta property="og:url" content="https://mote.day" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #efe6d2;
    --paper-warm:   #f4ecd9;
    --ink:          #0e1115;
    --ink-soft:     #3d4148;
    --ink-faint:    #7d7666;
    --rule:         #cdc1a1;
    --rule-soft:    #ddd2b1;
    --vermillion:   #d2381c;
    --vermillion-d: #a81e0a;

    --display: "Fraunces", "Times New Roman", serif;
    --body:    "Newsreader", Georgia, serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    font-optical-sizing: auto;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    background-image:
      radial-gradient(ellipse 90% 50% at 50% -10%, rgba(255,250,232,0.7), transparent 70%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(210,56,28,0.04), transparent 70%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.07  0 0 0 0 0.10  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  .page {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    padding: 18px 32px 48px;
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* — Masthead bar (single line) — */
  .bar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: rise 500ms ease-out 50ms forwards;
  }
  .bar .brand {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 30, "wght" 400;
    font-style: italic;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .bar .brand .dot { color: var(--vermillion); font-style: normal; }
  .bar .meta {
    display: flex;
    gap: 22px;
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .bar .meta .sep { color: var(--rule); }

  /* — Hero (above the fold) — */
  .hero {
    margin-top: 36px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
    align-items: start;
  }
  .hero-eyebrow {
    font-family: var(--body);
    font-style: italic;
    font-size: 15px;
    color: var(--vermillion);
    letter-spacing: 0.01em;
    margin: 0;
    opacity: 0;
    animation: rise 500ms ease-out 120ms forwards;
  }
  .hero-eyebrow .count {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "wght" 500;
    font-style: normal;
    font-size: 17px;
    color: var(--vermillion);
    margin-right: 4px;
    font-variant-numeric: tabular-nums;
  }
  .hero-eyebrow .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--vermillion);
    margin-right: 10px;
    transform: translateY(-2px);
    animation: pulse 1800ms ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; transform: translateY(-2px) scale(0.85); }
    50%      { opacity: 1;    transform: translateY(-2px) scale(1.15); }
  }

  h1.hero-title {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 50, "wght" 350;
    font-style: italic;
    font-size: clamp(56px, 9vw, 116px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    margin: 6px 0 0;
    color: var(--ink);
    opacity: 0;
    animation: rise 700ms ease-out 180ms forwards;
  }
  h1.hero-title .stamp {
    color: var(--vermillion);
    font-style: italic;
    position: relative;
    display: inline-block;
  }
  h1.hero-title .stamp::after {
    content: "";
    position: absolute;
    left: -2%;
    right: -2%;
    bottom: 8%;
    height: 14%;
    background: var(--vermillion);
    opacity: 0.14;
    z-index: -1;
    transform: skewX(-3deg);
  }

  /* — Composer — */
  #composer {
    margin-top: 18px;
    opacity: 0;
    animation: rise 700ms ease-out 280ms forwards;
  }

  .compose {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    align-items: stretch;
    border-bottom: 2px solid var(--ink);
    max-width: 760px;
  }
  .compose input[type="text"] {
    background: transparent;
    border: none;
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 40, "wght" 350;
    font-style: italic;
    font-size: clamp(36px, 5.5vw, 64px);
    line-height: 1.05;
    color: var(--ink);
    padding: 6px 14px 14px 0;
    outline: none;
    caret-color: var(--vermillion);
    letter-spacing: -0.015em;
    width: 100%;
  }
  .compose input::placeholder {
    color: var(--ink-faint);
    opacity: 0.6;
    font-style: italic;
  }

  .cta {
    font-family: var(--body);
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 0 28px;
    margin-bottom: 6px;
    cursor: pointer;
    font-weight: 500;
    align-self: stretch;
    transition: background 180ms ease, letter-spacing 240ms ease, transform 180ms ease;
    white-space: nowrap;
  }
  .cta:hover {
    background: var(--vermillion);
    letter-spacing: 0.32em;
  }
  .cta:active { transform: translateY(1px); }
  .cta:disabled { opacity: 0.55; cursor: wait; }

  .compose-foot {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    margin-top: 12px;
    max-width: 760px;
  }
  .hint {
    font-family: var(--body);
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    min-height: 18px;
  }
  .hint.error { color: var(--vermillion); font-style: italic; }
  .rules {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: right;
    flex-shrink: 0;
  }

  /* — Confirm state — */
  .confirm {
    max-width: 760px;
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 22px 0 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
  }
  .confirm-text {
    font-family: var(--display);
    font-style: italic;
    font-size: clamp(20px, 2.6vw, 24px);
    color: var(--ink-soft);
    font-weight: 350;
    line-height: 1.3;
  }
  .confirm-text .pick {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 60, "wght" 400;
    color: var(--vermillion);
    font-size: clamp(40px, 6vw, 60px);
    display: block;
    margin: 4px 0;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .actions { display: flex; gap: 14px; align-items: stretch; }
  .ghost {
    background: transparent;
    color: var(--ink-faint);
    padding: 0 14px;
    font-family: var(--body);
    font-size: 12px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    border: 1px solid var(--rule);
    cursor: pointer;
    transition: color 180ms ease, border-color 180ms ease;
    height: 56px;
  }
  .ghost:hover { color: var(--vermillion); border-color: var(--vermillion); }

  /* — You said state — */
  .you {
    max-width: 760px;
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    padding: 18px 0 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 28px;
    flex-wrap: wrap;
  }
  .you .you-l {
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .you .label {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-faint);
    flex-shrink: 0;
  }
  .you .word {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 60, "wght" 400;
    font-style: italic;
    font-size: clamp(48px, 7vw, 76px);
    color: var(--vermillion);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .you .badge {
    font-family: var(--body);
    font-size: 10px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    align-self: center;
  }

  /* — Cloud section — */
  .gallery {
    margin-top: 56px;
    flex: 1;
  }
  .gallery-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 0 0 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .gallery-head .label {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .gallery-head .label .ornament {
    color: var(--vermillion);
    margin-right: 8px;
    font-size: 13px;
  }
  .gallery-head a {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    border-bottom: 1px dotted var(--ink-faint);
    padding-bottom: 1px;
    transition: color 160ms ease, border-color 160ms ease;
  }
  .gallery-head a:hover { color: var(--vermillion); border-bottom-color: var(--vermillion); }

  .cloud {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: flex-start;
    gap: 6px 26px;
    line-height: 1;
    min-height: 200px;
    padding: 6px 0 24px;
  }
  .cloud .w {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 40, "wght" 350;
    color: var(--ink);
    transition: color 180ms ease, transform 180ms ease;
    cursor: default;
    display: inline-block;
    opacity: 0;
    animation: ink 520ms ease-out forwards;
    letter-spacing: -0.015em;
  }
  .cloud .w.italic { font-style: italic; }
  .cloud .w:hover { color: var(--vermillion); transform: translateY(-1px); }
  .cloud .w.mine {
    color: var(--vermillion);
    font-style: italic;
  }
  .cloud .w.pop {
    animation: ink-bleed 1100ms cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
  }

  @keyframes ink {
    from { opacity: 0; transform: translateY(4px); filter: blur(2px); }
    to   { opacity: 1; transform: translateY(0);   filter: blur(0); }
  }
  @keyframes ink-bleed {
    0%   { opacity: 0; transform: scale(0.7); filter: blur(8px); }
    50%  { opacity: 1; transform: scale(1.06); filter: blur(0.5px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .empty {
    width: 100%;
    text-align: left;
    font-family: var(--display);
    font-style: italic;
    font-size: 26px;
    color: var(--ink-faint);
    padding: 12px 0;
  }

  /* — Modal — */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(14,17,21,0.65);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 50;
    animation: fade 220ms ease-out;
  }
  .modal-bg.open { display: flex; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--paper);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.07  0 0 0 0 0.10  0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    max-width: 880px;
    width: 100%;
    max-height: 84vh;
    overflow: auto;
    padding: 32px 36px;
    border: 1px solid var(--rule);
    box-shadow: 0 30px 60px -20px rgba(14,17,21,0.5);
  }
  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
    gap: 16px;
  }
  .modal-head h3 {
    font-family: var(--display);
    font-variation-settings: "opsz" 144, "SOFT" 40, "wght" 350;
    font-style: italic;
    font-size: 36px;
    margin: 0;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .modal-head .meta {
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-faint);
    flex: 1;
    text-align: right;
    margin-right: 12px;
  }
  .modal-head .close {
    background: transparent;
    color: var(--ink-faint);
    padding: 6px 0;
    font-family: var(--body);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: color 180ms ease;
  }
  .modal-head .close:hover { color: var(--vermillion); }

  /* — Footer — */
  footer {
    margin-top: 64px;
    padding-top: 18px;
    border-top: 1px solid var(--rule-soft);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--body);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    gap: 16px;
  }
  footer em {
    font-style: italic;
    text-transform: none;
    letter-spacing: 0.02em;
    font-size: 13px;
    color: var(--ink-soft);
  }
  footer .mark { color: var(--vermillion); margin: 0 6px; font-style: normal; }

  @media (max-width: 720px) {
    .page { padding: 14px 18px 32px; }
    .bar .meta { gap: 10px; font-size: 10px; }
    .bar .meta .hide-sm { display: none; }
    .compose { grid-template-columns: 1fr; border-bottom: none; }
    .compose input[type="text"] { border-bottom: 2px solid var(--ink); padding-right: 0; }
    .cta { padding: 16px; margin-top: 14px; margin-bottom: 0; }
    .compose-foot { flex-direction: column; align-items: flex-start; gap: 6px; }
    .rules { text-align: left; }
    .confirm { grid-template-columns: 1fr; }
    .actions { width: 100%; }
    .ghost { flex: 1; }
    footer { flex-direction: column; align-items: flex-start; gap: 10px; }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="bar">
      <div class="brand">Mote<span class="dot">.</span></div>
      <div class="meta">
        <span id="dateline">—</span>
        <span class="sep">/</span>
        <span id="issue">No. —</span>
        <span class="sep hide-sm">/</span>
        <span class="hide-sm" id="reset">Resets 00:00 UTC</span>
      </div>
    </div>

    <section class="hero">
      <p class="hero-eyebrow" id="live"><span class="pulse"></span><span class="count" id="live-count">—</span>voices, today</p>
      <h1 class="hero-title">Today, in <span class="stamp">a word.</span></h1>
      <section id="composer"></section>
    </section>

    <section class="gallery">
      <div class="gallery-head">
        <div class="label"><span class="ornament">❦</span><span id="cloud-label">The world's words, today</span></div>
        <a href="#" id="open-yesterday">Yesterday's page →</a>
      </div>
      <div class="cloud" id="cloud"></div>
    </section>

    <footer>
      <span>One word a day. <em>Anonymous, by design.</em></span>
      <span>mote.day <span class="mark">·</span> set in <em>Fraunces</em></span>
    </footer>
  </div>

  <div class="modal-bg" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">Yesterday</h3>
        <span class="meta" id="modal-meta"></span>
        <button class="close" id="modal-close">Close ✕</button>
      </div>
      <div class="cloud" id="modal-cloud"></div>
    </div>
  </div>

<script type="module">
  const SUPABASE_URL = "https://mhtutulyduovxubzpnvd.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_uP6fxaX0sr5Msc3a507uwA_2rtT_E1J";

  const PROFANITY = new Set([
    "fuck","shit","bitch","cunt","dick","cock","pussy","asshole","bastard",
    "slut","whore","fag","nigger","retard"
  ]);

  const composer  = document.getElementById("composer");
  const cloud     = document.getElementById("cloud");
  const cloudLabel = document.getElementById("cloud-label");
  const modal     = document.getElementById("modal");
  const modalCloud = document.getElementById("modal-cloud");
  const modalTitle = document.getElementById("modal-title");
  const modalMeta  = document.getElementById("modal-meta");
  const liveCount  = document.getElementById("live-count");

  /* — Date helpers — */
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const FULLMONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const FULLWEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  function ordinal(n) {
    const s = ["th","st","nd","rd"], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }
  function toRoman(n) {
    const map = [["M",1000],["CM",900],["D",500],["CD",400],["C",100],["XC",90],["L",50],["XL",40],["X",10],["IX",9],["V",5],["IV",4],["I",1]];
    let r = "";
    for (const [s, v] of map) while (n >= v) { r += s; n -= v; }
    return r;
  }
  function dayOfYear(d) {
    const start = Date.UTC(d.getUTCFullYear(), 0, 0);
    const diff = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()) - start;
    return Math.floor(diff / 86400000);
  }
  function setBar() {
    const now = new Date();
    document.getElementById("dateline").textContent =
      `${WEEKDAYS[now.getUTCDay()]} · ${MONTHS[now.getUTCMonth()]} ${now.getUTCDate()}`;
    document.getElementById("issue").textContent = `No. ${toRoman(dayOfYear(now))}`;
  }
  setBar();

  /* — Identity — */
  const deviceId = (() => {
    let id = localStorage.getItem("mote.device");
    if (!id) {
      id = crypto.randomUUID();
      localStorage.setItem("mote.device", id);
    }
    return id;
  })();

  function todayUTC() { return new Date().toISOString().slice(0, 10); }
  function yesterdayUTC() {
    const d = new Date();
    d.setUTCDate(d.getUTCDate() - 1);
    return d.toISOString().slice(0, 10);
  }
  function prettyDate(iso) {
    const [y, m, day] = iso.split("-").map(Number);
    const d = new Date(Date.UTC(y, m - 1, day));
    return `${FULLWEEKDAYS[d.getUTCDay()]} · ${ordinal(d.getUTCDate())} ${FULLMONTHS[d.getUTCMonth()]}`;
  }

  function loadMine() {
    const raw = localStorage.getItem("mote.mine");
    if (!raw) return null;
    try {
      const m = JSON.parse(raw);
      const ageMs = Date.now() - new Date(m.submitted_at).getTime();
      if (ageMs > 24 * 60 * 60 * 1000) {
        localStorage.removeItem("mote.mine");
        return null;
      }
      return m;
    } catch { return null; }
  }
  function saveMine(m) { localStorage.setItem("mote.mine", JSON.stringify(m)); }

  /* — API — */
  async function api(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=representation",
        ...(opts.headers || {})
      }
    });
    return res;
  }

  async function fetchCloud(date) {
    const res = await api(`words?utc_date=eq.${date}&select=word`);
    if (!res.ok) return [];
    const rows = await res.json();
    const counts = new Map();
    for (const r of rows) counts.set(r.word, (counts.get(r.word) || 0) + 1);
    const total = rows.length;
    return { entries: [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0])), total };
  }

  async function submitWord(word) {
    const res = await api("words", { method: "POST", body: JSON.stringify({ word, device_id: deviceId }) });
    if (res.status === 409) return { ok: false, reason: "duplicate" };
    if (!res.ok) {
      const txt = await res.text();
      if (txt.includes("words_device_date_uidx") || txt.includes("duplicate")) return { ok: false, reason: "duplicate" };
      return { ok: false, reason: "error", detail: txt };
    }
    const [row] = await res.json();
    return { ok: true, row };
  }

  /* — Live count animation — */
  function animateCount(target) {
    const el = liveCount;
    const start = parseInt(el.dataset.cur || "0", 10);
    const dur = 700;
    const t0 = performance.now();
    function tick(t) {
      const p = Math.min((t - t0) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const v = Math.round(start + (target - start) * eased);
      el.textContent = v.toLocaleString();
      el.dataset.cur = v;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* — Render — */
  function renderCloud(target, entries, mine, popWord) {
    target.innerHTML = "";
    if (!entries.length) {
      const p = document.createElement("div");
      p.className = "empty";
      p.textContent = "Be the first to set a word.";
      target.appendChild(p);
      return;
    }
    const max = entries[0][1];
    const min = entries[entries.length - 1][1];
    entries.forEach(([word, count], i) => {
      const t = max === min ? 0.5 : (count - min) / (max - min);
      const size = 22 + Math.round(Math.pow(t, 0.8) * 78);
      const el = document.createElement("span");
      el.className = "w";
      if (count === 1 && max > 1) el.classList.add("italic");
      el.textContent = word;
      el.style.fontSize = size + "px";
      el.style.animationDelay = Math.min(i * 14, 600) + "ms";
      el.title = `${count} ${count === 1 ? "voice" : "voices"}`;
      if (mine && word === mine.word) el.classList.add("mine");
      if (popWord && word === popWord) {
        el.classList.add("pop");
        el.style.animationDelay = "0ms";
      }
      target.appendChild(el);
    });
  }

  function validate(raw) {
    const word = raw.trim().toLowerCase();
    if (!word) return { ok: false, msg: "Type a word — anything." };
    if (!/^[a-z]+$/.test(word)) return { ok: false, msg: "Letters only. No spaces, numbers, or punctuation." };
    if (word.length > 20) return { ok: false, msg: "Twenty letters or fewer." };
    if (PROFANITY.has(word)) return { ok: false, msg: "Try another word." };
    return { ok: true, word };
  }

  function renderInput() {
    composer.innerHTML = `
      <div class="compose">
        <input id="word" type="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" maxlength="20" placeholder="type your word…" />
        <button class="cta" id="next">Press it →</button>
      </div>
      <div class="compose-foot">
        <div class="hint" id="hint">One word, lowercase. Once set, it cannot be unset.</div>
        <div class="rules">A–Z · max 20</div>
      </div>
    `;
    const input = document.getElementById("word");
    const hint = document.getElementById("hint");
    const next = document.getElementById("next");
    setTimeout(() => input.focus(), 60);

    function go() {
      const v = validate(input.value);
      if (!v.ok) {
        hint.textContent = v.msg;
        hint.classList.add("error");
        return;
      }
      renderConfirm(v.word);
    }
    input.addEventListener("input", () => {
      hint.classList.remove("error");
      hint.textContent = "One word, lowercase. Once set, it cannot be unset.";
    });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
    next.addEventListener("click", go);
  }

  function renderConfirm(word) {
    composer.innerHTML = `
      <div class="confirm">
        <div class="confirm-text">
          You set the word —
          <span class="pick">${word}</span>
          for today's page. Press to commit.
        </div>
        <div class="actions">
          <button class="ghost" id="back">← Back</button>
          <button class="cta" id="send">Press it</button>
        </div>
      </div>
    `;
    document.getElementById("back").addEventListener("click", renderInput);
    const send = document.getElementById("send");
    send.addEventListener("click", async () => {
      send.disabled = true;
      send.textContent = "Pressing…";
      const r = await submitWord(word);
      if (!r.ok && r.reason === "duplicate") {
        const mine = { word, submitted_at: new Date().toISOString(), utc_date: todayUTC() };
        saveMine(mine);
        await refresh(word);
        return;
      }
      if (!r.ok) {
        composer.innerHTML = `<div class="hint error" style="padding: 16px 0">The press jammed. Try again in a moment.</div>`;
        setTimeout(renderInput, 1800);
        return;
      }
      const mine = { word: r.row.word, submitted_at: r.row.submitted_at, utc_date: r.row.utc_date };
      saveMine(mine);
      await refresh(r.row.word);
    });
  }

  function renderYou(mine) {
    const today = todayUTC();
    const isYesterday = mine.utc_date && mine.utc_date !== today;
    composer.innerHTML = `
      <div class="you">
        <div class="you-l">
          <span class="label">${isYesterday ? "Yesterday, you said" : "Today, you said"}</span>
          <span class="word">${mine.word}</span>
        </div>
        ${isYesterday ? `<span class="badge">From yesterday's page</span>` : `<span class="badge">Locked until midnight UTC</span>`}
      </div>
    `;
  }

  async function refresh(popWord) {
    const mine = loadMine();
    const today = todayUTC();
    const showingTodayMine = mine && mine.utc_date === today;
    if (mine) renderYou(mine);
    else renderInput();
    cloudLabel.textContent = "The world's words, today";
    const { entries, total } = await fetchCloud(today);
    animateCount(total);
    const highlightMine = showingTodayMine ? mine : null;
    renderCloud(cloud, entries, highlightMine, popWord);
  }

  /* — Yesterday modal — */
  document.getElementById("open-yesterday").addEventListener("click", async (e) => {
    e.preventDefault();
    modal.classList.add("open");
    modalCloud.innerHTML = `<div class="empty">Loading…</div>`;
    const y = yesterdayUTC();
    modalTitle.textContent = "Yesterday";
    modalMeta.textContent = prettyDate(y);
    const { entries } = await fetchCloud(y);
    renderCloud(modalCloud, entries, null, null);
  });
  document.getElementById("modal-close").addEventListener("click", () => modal.classList.remove("open"));
  modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("open"); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") modal.classList.remove("open"); });

  refresh();
</script>
</body>
