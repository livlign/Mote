<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mote — Today, in a Word</title>
<meta property="og:title" content="Mote — Today, in a Word" />
<meta property="og:description" content="What's the world thinking today? One word per person, per day." />
<meta property="og:url" content="https://mote.day" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:      #ffffff;
    --ink:        #000000;
    --ink-soft:   rgba(0,0,0,0.55);
    --ink-faint:  rgba(0,0,0,0.32);
    --ink-ghost:  rgba(0,0,0,0.12);
    --rule:       rgba(0,0,0,0.12);
    --cobalt:     #0033CC;

    --sans: "Geist", system-ui, sans-serif;
    --mono: "Geist Mono", ui-monospace, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* — Header — */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 2px solid var(--ink);
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo .mark {
    width: 11px;
    height: 11px;
    background: var(--cobalt);
  }
  .logo .word {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .nav {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .nav button, .nav a {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 4px 0;
    text-decoration: none;
    transition: color 160ms ease;
  }
  .nav button:hover, .nav a:hover { color: var(--cobalt); }
  .nav .more {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0;
    line-height: 1;
  }

  /* — Description — */
  .description {
    padding: 28px 32px 22px;
    border-bottom: 1px solid var(--rule);
    flex-shrink: 0;
  }
  .title {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    margin: 0 0 14px;
  }
  .headline {
    font-family: var(--sans);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin: 0;
  }

  /* — Cloud canvas — */
  .canvas-wrap {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    padding: 28px 32px;
  }
  .canvas {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .canvas .w {
    position: absolute;
    font-family: var(--sans);
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.025em;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 200ms ease, transform 200ms ease, font-size 600ms cubic-bezier(0.65, 0, 0.35, 1);
    opacity: 0;
    animation: fade-in 800ms ease-out forwards;
  }
  .canvas .w:hover {
    color: var(--cobalt);
    transform: scale(1.04);
    z-index: 4;
  }
  .canvas .w.mine { color: var(--cobalt); }
  .canvas .w.pulse { animation: pulse-once 600ms cubic-bezier(0.65,0,0.35,1); }
  .canvas .see-all {
    position: absolute;
    bottom: 6px;
    right: 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cobalt);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 4px 0;
  }
  .canvas .see-all:hover { text-decoration: underline; }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes pulse-once {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* — Word tooltip — */
  .word-tip {
    position: fixed;
    z-index: 60;
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: 8px 10px 10px;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(2px);
    transition: opacity 160ms ease, transform 160ms ease;
    font-family: var(--mono);
  }
  .word-tip.show { opacity: 1; transform: translateY(0); }
  .word-tip .count {
    font-size: 11px;
    color: var(--ink);
    font-weight: 500;
  }
  .word-tip .feel {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--ink-ghost);
    font-size: 10px;
    color: var(--cobalt);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border-left: none; border-right: none; border-bottom: none;
    padding-left: 0; padding-right: 0;
    width: 100%;
    text-align: left;
  }

  /* — Empty / loading / error cloud states — */
  .canvas-msg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: center;
  }
  .canvas-msg button {
    margin-left: 8px;
    background: transparent;
    border: none;
    font-family: var(--mono);
    color: var(--cobalt);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0;
  }

  /* — Early-day state — */
  .early {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .early .narrative {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 28px;
    text-align: center;
  }
  .early .big {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 88px;
    line-height: 1;
    color: var(--cobalt);
    letter-spacing: -0.04em;
    margin-bottom: 8px;
  }
  .early .label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .early .divider {
    width: 60px;
    height: 1px;
    background: var(--ink);
    margin-bottom: 28px;
  }
  .early .words {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 28px;
    justify-content: center;
    align-items: baseline;
    max-width: 800px;
  }
  .early .words .w {
    position: static;
    font-family: var(--sans);
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.025em;
    cursor: pointer;
    transition: color 200ms ease, transform 200ms ease;
  }
  .early .words .w:hover { color: var(--cobalt); transform: scale(1.04); }
  .early .words .w.mine { color: var(--cobalt); }

  /* — Stats strip — */
  .stats {
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    padding: 10px 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 18px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
    overflow: hidden;
  }
  .stats .item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .stats .num { font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats .sep { color: var(--ink-faint); }
  .stats .typer {
    flex: 1;
    color: var(--ink-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
  }
  .stats .typer .caret {
    display: inline-block;
    width: 1px;
    height: 11px;
    background: var(--cobalt);
    margin-left: 1px;
    vertical-align: -1px;
    animation: blink 800ms steps(2, jump-none) infinite;
  }
  .stats .typer .caret.hidden { display: none; }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* — Submission — */
  .submit {
    padding: 20px 32px 24px;
    flex-shrink: 0;
  }
  .submit-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: end;
    gap: 14px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 6px;
  }
  .submit-row .arrow {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--cobalt);
    line-height: 1;
    padding-bottom: 4px;
  }
  .submit-row input[type="text"] {
    background: transparent;
    border: none;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 22px;
    line-height: 1.1;
    color: var(--ink);
    padding: 0;
    outline: none;
    caret-color: var(--cobalt);
    letter-spacing: -0.02em;
    width: 100%;
  }
  .submit-row input::placeholder {
    color: var(--ink-faint);
    font-weight: 500;
  }
  .send {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    padding: 8px 18px;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
  }
  .send:hover { background: var(--paper); color: var(--ink); }
  .send:disabled { opacity: 0.32; cursor: not-allowed; }
  .send.confirm-btn { background: var(--cobalt); border-color: var(--cobalt); color: var(--paper); }
  .send.confirm-btn:hover { background: var(--paper); color: var(--cobalt); }

  .submit-foot {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }
  .rules-text {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .rules-text.error { color: var(--cobalt); }
  .rules-text .match {
    color: var(--cobalt);
    margin-left: 8px;
  }

  .confirm-text {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .confirm-text .word {
    color: var(--cobalt);
    font-weight: 800;
    text-transform: lowercase;
    margin: 0 4px;
    letter-spacing: -0.02em;
  }
  .confirm-back {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .confirm-back:hover { color: var(--cobalt); }

  /* — You said panel — */
  .you-said {
    padding-bottom: 6px;
  }
  .you-said .label {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .you-said .word {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 40px;
    color: var(--cobalt);
    line-height: 1;
    letter-spacing: -0.025em;
    margin-bottom: 10px;
  }
  .you-said .context {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* — Slide animation element — */
  .slide-ghost {
    position: fixed;
    z-index: 80;
    font-family: var(--sans);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.025em;
    color: var(--ink);
    pointer-events: none;
    will-change: transform, font-size, color;
    white-space: nowrap;
  }

  /* — New-day banner — */
  .new-day {
    flex-shrink: 0;
    background: var(--cobalt);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 10px 32px;
    display: none;
    align-items: center;
    justify-content: space-between;
  }
  .new-day.show { display: flex; }
  .new-day button {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--paper);
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
  }
  .new-day button:hover { background: var(--paper); color: var(--cobalt); }

  /* — History overlay — */
  .history {
    position: fixed; inset: 0;
    background: var(--paper);
    z-index: 70;
    transform: translateY(100%);
    transition: transform 320ms cubic-bezier(0.65, 0, 0.35, 1);
    display: flex;
    flex-direction: column;
  }
  .history.open { transform: translateY(0); }
  .history-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 2px solid var(--ink);
    flex-shrink: 0;
  }
  .history-bar h2 {
    margin: 0;
    font-family: var(--mono);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .history-bar .close {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 22px;
    line-height: 1;
    color: var(--ink);
    padding: 0;
    transition: color 160ms ease;
  }
  .history-bar .close:hover { color: var(--cobalt); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--ink-ghost);
    padding: 0 32px;
    flex-shrink: 0;
  }
  .tabs button {
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 14px 18px;
    transition: color 160ms ease, background 160ms ease;
  }
  .tabs button:hover { color: var(--ink); }
  .tabs button.active {
    background: var(--ink);
    color: var(--paper);
  }

  .history-body {
    flex: 1 1 auto;
    overflow: auto;
    padding: 0 32px 40px;
  }

  .date-nav {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid var(--ink-ghost);
  }
  .date-nav button {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 8px 14px;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
  }
  .date-nav button:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .date-nav button:disabled {
    color: var(--ink-faint);
    border-color: var(--ink-ghost);
    cursor: not-allowed;
  }
  .date-nav .label {
    text-align: center;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    color: var(--ink);
    background: transparent;
    border: none;
    padding: 6px 10px;
    position: relative;
  }
  .date-nav .label .chev { color: var(--ink-soft); margin-left: 6px; }

  .section-label {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 28px 0 14px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border-top: 1px solid var(--ink-ghost);
  }
  .stat-grid .cell {
    padding: 16px 14px;
    border-right: 1px solid var(--ink-ghost);
    border-bottom: 1px solid var(--ink-ghost);
  }
  .stat-grid .cell:last-child { border-right: none; }
  .stat-grid .cell .v {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 32px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
    margin-bottom: 8px;
  }
  .stat-grid .cell .v.cobalt { color: var(--cobalt); text-transform: lowercase; }
  .stat-grid .cell .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 500;
  }

  .top-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .top-list li {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: baseline;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--ink-ghost);
    cursor: default;
    transition: padding-left 160ms ease;
  }
  .top-list li:hover { padding-left: 6px; }
  .top-list li:hover .word { color: var(--cobalt); }
  .top-list .rank {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .top-list .word {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.02em;
    transition: color 160ms ease;
  }
  .top-list .n {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .top-list .n .x { color: var(--ink-faint); margin-left: 1px; }

  .see-all-link {
    margin-top: 14px;
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--cobalt);
    text-decoration: none;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .see-all-link:hover { text-decoration: underline; }

  .insight {
    border-left: 3px solid var(--cobalt);
    padding: 8px 0 8px 14px;
    margin-top: 12px;
  }
  .insight .text {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .insight .text .v { color: var(--cobalt); font-weight: 700; }
  .insight .meta {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .day-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .day-list li {
    display: grid;
    grid-template-columns: 56px 120px 1fr auto;
    align-items: baseline;
    gap: 16px;
    padding: 12px 0;
    border-bottom: 1px solid var(--ink-ghost);
  }
  .day-list .day {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .day-list .date {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
  }
  .day-list .word {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .day-list .n {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .day-list .n .x { color: var(--ink-faint); }

  .all-words {
    column-count: 4;
    column-gap: 32px;
  }
  .all-words .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid var(--ink-ghost);
    break-inside: avoid;
    font-family: var(--sans);
    font-size: 14px;
  }
  .all-words .row .w { font-weight: 600; }
  .all-words .row .n {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);

  const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function prettyDate(iso) {
    const [y, m, d] = iso.split("-").map(Number);
    const dt = new Date(Date.UTC(y, m - 1, d));
    return `${FULLDAYS[dt.getUTCDay()]}, ${MONTHS[dt.getUTCMonth()]} ${dt.getUTCDate()}, ${dt.getUTCFullYear()}`;

  /* — Cloud sizing — */
  // size = minSize + (maxSize - minSize) * pow(count/maxCount, 0.55)
  // per-word variation: 0.92 + (hash(word) % 16)/100  (±8%)
  const MIN_SIZE = 14;
  const MAX_SIZE = 56;
  const MIN_SIZE_M = 11;
  const MAX_SIZE_M = 44;
  function sizeFor(count, maxCount, word) {
    const isMobile = window.innerWidth <= 768;
    const min = isMobile ? MIN_SIZE_M : MIN_SIZE;
    const max = isMobile ? MAX_SIZE_M : MAX_SIZE;
    const t = maxCount === 0 ? 0 : Math.pow(count / maxCount, 0.55);
    const base = min + (max - min) * t;
    const variation = 0.92 + ((hash(word) % 16) / 100);
    return Math.round(base * variation);
  }

  /* — Spiral packing — */
  const positions = new Map(); // word -> { el, x, y, w, h, size, count }

  function rectsOverlap(a, b, pad = 0) {
    return !(a.x + a.w + pad < b.x || b.x + b.w + pad < a.x ||
             a.y + a.h + pad < b.y || b.y + b.h + pad < a.y);
  }

  function spiralFind(w, h, others, canvasW, canvasH, anchorX, anchorY) {
    const margin = 4;
    const candidate = (x, y) => ({ x: x - w / 2, y: y - h / 2, w, h });
    const tryCand = (cand) => {
      if (cand.x < margin || cand.y < margin) return false;
      if (cand.x + w > canvasW - margin) return false;
      if (cand.y + h > canvasH - margin) return false;
      for (const o of others) if (rectsOverlap(cand, o, 7)) return false;
      return true;
    };
    const center = candidate(anchorX, anchorY);
    if (tryCand(center)) return center;
    for (let r = 14; r < Math.max(canvasW, canvasH); r += 4) {
      const steps = Math.max(8, Math.floor(r * 0.55));
      const phase = ((TODAY_SEED + Math.round(r * 13)) % 1000) / 1000 * Math.PI * 2;
      for (let s = 0; s < steps; s++) {
        const a = phase + (s / steps) * Math.PI * 2;
        const x = anchorX + r * Math.cos(a);
        const y = anchorY + r * Math.sin(a);
        const cand = candidate(x, y);
        if (tryCand(cand)) return cand;
      }
    }
    return null;
  }

  function dayAnchor(canvasW, canvasH) {
    // 45% ± 5% horizontally, 50% ± 5% vertically — stable per day
    const dx = ((TODAY_SEED >>> 0) % 100) / 100 - 0.5; // -0.5..0.5
    const dy = (((TODAY_SEED >>> 8) >>> 0) % 100) / 100 - 0.5;
    return {
      x: canvasW * (0.45 + dx * 0.1),
      y: canvasH * (0.50 + dy * 0.1)
    };
  }

  function makeWordEl(word, size, mine, count) {
    const el = document.createElement("span");

  let earlyOverride = false;

      </div>
    `;
    document.getElementById("confirm-back").addEventListener("click", () => {
      renderSubmitInput();
      const input = document.getElementById("word");
      if (input) {
        input.value = v.word;
        input.focus();
        input.dispatchEvent(new Event("input"));
      }
    });
    document.getElementById("send-confirm").addEventListener("click", async () => {
      const btn = document.getElementById("send-confirm");
      btn.disabled = true;
      btn.textContent = "Sending…";
      await commitSubmission(v.word);
    });
  }

  function renderYouSaid(mine, voices) {
    const others = Math.max(0, voices - 1);
    submitEl.innerHTML = `
      <div class="you-said">
        <div class="label">You said</div>
        <div class="word">${mine.word}</div>
        <div class="context">${others.toLocaleString()} other ${others === 1 ? "person" : "people"} said this today</div>
      </div>
    `;
  }

  /* — Slide animation — */
  async function commitSubmission(word) {
    // Fetch current state
    const before = await fetchToday();
    lastEntries = before.entries;
    lastVoices = before.voices;

    // Where the word would land
    const matchEntry = before.entries.find(([w]) => w === word);
    const futureCount = matchEntry ? matchEntry[1] + 1 : 1;
    const futureMax = Math.max(matchEntry ? matchEntry[1] + 1 : 0,
      ...before.entries.map(([, c]) => c));

    const inputBtn = submitEl.querySelector(".confirm-text .word");
    const sourceRect = inputBtn ? inputBtn.getBoundingClientRect() : submitEl.getBoundingClientRect();

    // Make API call
    const res = await submitWord(word);
    if (!res.ok && res.reason === "duplicate") {
      // already submitted today — server says no
      saveMine({ word, submitted_at: new Date().toISOString(), utc_date: todayUTC() });
      await refresh(word);
      return;
    }
    if (!res.ok) {
      submitEl.innerHTML = `
        <div class="submit-row">
          <span class="arrow">→</span>
          <span class="confirm-text" style="color:var(--cobalt)">Couldn't send.</span>
          <button class="send" id="retry">Try again</button>
        </div>
        <div class="submit-foot">
          <div class="rules-text error">Try again in a moment.</div>
        </div>
      `;
      document.getElementById("retry").addEventListener("click", () => renderSubmitConfirm(word));
      return;
    }

    saveMine({ word: res.row.word, submitted_at: res.row.submitted_at, utc_date: res.row.utc_date });

    // Compute target rect:
    // If word exists in cloud → its current rect; we'll grow it after slide.
    // Else → spiral-find a position for the new word at projected size.
    let targetRect = null;
    let resizeExisting = null;

    if (matchEntry && positions.has(word)) {
      const p = positions.get(word);
      const r = p.el.getBoundingClientRect();
      targetRect = { left: r.left, top: r.top, fontSize: p.size };
      resizeExisting = { word, newCount: matchEntry[1] + 1, newMax: futureMax };
    } else {
      // try to place
      const canvasW = canvasEl.clientWidth, canvasH = canvasEl.clientHeight;
      const newSize = sizeFor(futureCount, futureMax, word);
      // measure
      const tmp = document.createElement("span");
      tmp.className = "w";
      tmp.style.cssText = "position:absolute; left:-9999px; top:-9999px; font-size:" + newSize + "px;";
      tmp.textContent = word;
      canvasEl.appendChild(tmp);
      const w = tmp.offsetWidth, h = tmp.offsetHeight;
      tmp.remove();
      const others = [...positions.values()];
      const anchor = dayAnchor(canvasW, canvasH);
      const pos = spiralFind(w, h, others, canvasW, canvasH, anchor.x, anchor.y);
      if (pos) {
        const cR = canvasEl.getBoundingClientRect();
        targetRect = { left: cR.left + pos.x, top: cR.top + pos.y, fontSize: newSize };
      } else {
        // can't place — just refresh
        await refresh(word);
        return;
      }
    }

    // Run slide
    await runSlide(word, sourceRect, targetRect);

    // Hide the input area immediately while sliding (already done via overwrite below)
    // Show "you said"
    renderYouSaid({ word: res.row.word, utc_date: res.row.utc_date }, before.voices + 1);

    // Refresh cloud (will pulse the word)
    await refresh(word);
  }

  function runSlide(word, sourceRect, targetRect) {
    return new Promise(resolve => {
      // Hide input row
      submitEl.style.opacity = "0";
      setTimeout(() => { submitEl.style.opacity = ""; }, 200);

      const ghost = document.createElement("div");
      ghost.className = "slide-ghost";
      ghost.textContent = word;
      ghost.style.left = sourceRect.left + "px";
      ghost.style.top = sourceRect.top + "px";
      ghost.style.fontSize = "22px";
      ghost.style.color = "#000";
      document.body.appendChild(ghost);

      // Force layout
      void ghost.offsetWidth;

      const dx = targetRect.left - sourceRect.left;
      const dy = targetRect.top - sourceRect.top;
      // arc peak
      const peakY = Math.min(sourceRect.top, targetRect.top) - 30;
      const midX = sourceRect.left + dx / 2;

      // Use Web Animations API for arc (two-phase)
      const dur = 750;
      ghost.animate([
        { transform: "translate(0,0)", fontSize: "22px", color: "#000", offset: 0 },
        { transform: `translate(${midX - sourceRect.left}px, ${peakY - sourceRect.top}px)`, fontSize: ((22 + targetRect.fontSize) / 2) + "px", color: "#001a99", offset: 0.6 },
        { transform: `translate(${dx}px, ${dy}px)`, fontSize: targetRect.fontSize + "px", color: "#0033CC", offset: 1 }
      ], {
        duration: dur,
        easing: "cubic-bezier(0.65, 0, 0.35, 1)",
        fill: "forwards"
      }).onfinish = () => {
        ghost.remove();
        resolve();
      };
    });
  }

  /* — Refresh cloud + stats — */
  let lastTodayKey = todayUTC();
  let lastVoiceCount = 0;
  let lastWordInfo = null; // { word, at }

  async function refresh(popWord) {
    if (todayUTC() !== lastTodayKey) {
      // day rolled over
      newDayEl.classList.add("show");
      lastTodayKey = todayUTC();
    }
    let data;
    try {
      data = await fetchToday();
    } catch (e) {
      // error state
      canvasEl.innerHTML = `<div class="canvas-msg">Couldn't reach today's words. <button id="retry-cloud">Try again</button></div>`;
      const r = document.getElementById("retry-cloud");
      if (r) r.addEventListener("click", () => refresh());
      sVoices.textContent = "—";
      sWords.textContent = "—";
      return;
    }
    lastEntries = data.entries;
    lastVoices = data.voices;
    lastVoiceCount = data.voices;
    lastWordInfo = data.last;

    sVoices.textContent = data.voices.toLocaleString();
    sWords.textContent = data.unique.toLocaleString();

    const mine = loadMine();
    if (mine && mine.utc_date === todayUTC()) {
      if (!submitEl.querySelector(".you-said")) renderYouSaid(mine, data.voices);
    } else {
      // show input if not currently in confirm state
      if (!submitEl.querySelector(".confirm-text") && !submitEl.querySelector(".compose")) {
        if (!submitEl.querySelector(".submit-row")) renderSubmitInput();
      }
    }

    renderCloudArea(data.entries, data.voices, mine && mine.utc_date === todayUTC() ? mine : null, popWord);
  }

  /* — Stats typer (Type 1 + Type 3 + Type 4) — */
  let typerCycleT = null;
  let typerActive = false;

  function timeAgo(d) {
    const s = Math.max(0, Math.round((Date.now() - d.getTime()) / 1000));
    if (s < 60) return s + "s ago";
    const m = Math.round(s / 60);
    if (m < 60) return m + "m ago";
    return Math.round(m / 60) + "h ago";
  }

  function pickLine() {
    const mine = loadMine();
    const submitted = mine && mine.utc_date === todayUTC();
    const lines = [];
    if (lastVoiceCount > 0 && lastWordInfo) {
      lines.push(`last: ${lastWordInfo.word}, ${timeAgo(lastWordInfo.at)}`);
    }
    if (lastVoiceCount > 0) {
      lines.push(`${lastVoiceCount.toLocaleString()} voices today, climbing`);
    }
    if (submitted) {
      const match = lastEntries.find(([w]) => w === mine.word);
      if (match && match[1] > 1) lines.push(`"${mine.word}" said by ${match[1] - 1} others today`);
    } else {
      const prompts = ["what's one word for today?", "if you had to choose one", "a word, briefly"];
      lines.push(prompts[Math.floor(Math.random() * prompts.length)]);
    }
    return lines[Math.floor(Math.random() * lines.length)] || "";
  }

  async function typeLine(text) {
    typerEl.innerHTML = `<span class="t"></span><span class="caret"></span>`;
    const t = typerEl.querySelector(".t");
    const caret = typerEl.querySelector(".caret");
    for (let i = 0; i < text.length; i++) {
      t.textContent += text[i];
      const ch = text[i];
      let delay = 25 + Math.random() * 35;
      if (ch === " " || /[.,;:!?]/.test(ch)) delay = 140;
      await new Promise(r => setTimeout(r, delay));
    }
    caret.classList.add("hidden");
  }

  async function runTyperCycle() {
    if (typerActive) return;
    typerActive = true;
    while (typerActive) {
      const line = pickLine();
      if (line) await typeLine(line);
      await new Promise(r => setTimeout(r, 17000)); // ~25s total cycle (≈3s typing + 14-17s wait)
    }
  }

  /* — History overlay — */
  let historyTab = "single";
  let historyDate = todayUTC();

  document.getElementById("open-history").addEventListener("click", () => openHistory());
  document.getElementById("history-close").addEventListener("click", () => closeHistory());
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && historyEl.classList.contains("open")) closeHistory(); });
  document.querySelectorAll(".tabs .tab").forEach(b => {
    b.addEventListener("click", () => {
      historyTab = b.dataset.tab;
      document.querySelectorAll(".tabs .tab").forEach(x => x.classList.toggle("active", x.dataset.tab === historyTab));
      renderHistory();
    });
  });

  function openHistory() {
    historyEl.classList.add("open");
    historyEl.setAttribute("aria-hidden", "false");
    historyTab = "single";
    historyDate = todayUTC();
    document.querySelectorAll(".tabs .tab").forEach(x => x.classList.toggle("active", x.dataset.tab === "single"));
    renderHistory();
  }
  function closeHistory() {
    historyEl.classList.remove("open");
    historyEl.setAttribute("aria-hidden", "true");
  }
  function openHistoryAllWords(date) {
    openHistory();
    historyDate = date;
    historyTab = "single";
    renderHistory(true);
  }

  async function renderHistory(showAllWords = false) {
    historyBody.innerHTML = `<div style="font-family:var(--mono); font-size:12px; padding:24px 0; color:var(--ink-soft); letter-spacing:0.06em; text-transform:uppercase;">Loading…</div>`;
    if (historyTab === "single") {
      await renderHistorySingle(showAllWords);
    } else {
      await renderHistoryWeek();
    }
  }

  async function renderHistorySingle(showAllWords = false) {
    const date = historyDate;
    const data = await fetchDay(date);
    const mostSaid = data.entries[0] ? data.entries[0][0] : null;
    const mostSaidCount = data.entries[0] ? data.entries[0][1] : 0;
    const top10 = data.entries.slice(0, 10);
    const max = top10[0] ? top10[0][1] : 1;
    const isToday = date === todayUTC();

    // Compare to same weekday last week
    let insightHTML = "";
    try {
      const prevDate = isoDayBack(7 + Math.round((Date.parse(todayUTC()) - Date.parse(date)) / (24*60*60*1000)));
      const prev = await fetchDay(prevDate);
      if (prev.voices > 0) {
        const pct = Math.round(((data.voices - prev.voices) / prev.voices) * 100);
        const dir = pct >= 0 ? "Up" : "Down";
        const [y, m, d] = prevDate.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        insightHTML = `
          <div class="insight">
            <div class="text">${dir} <span class="v">${Math.abs(pct)}%</span> from last ${FULLDAYS[dt.getUTCDay()]}.</div>
            <div class="meta">${data.voices.toLocaleString()} voices ${isToday ? "today" : "this day"} · ${prev.voices.toLocaleString()} last ${SHORTDAYS[dt.getUTCDay()]}</div>
          </div>
        `;
      }
    } catch {}

    historyBody.innerHTML = `
      <div class="date-nav">
        <button id="prev-day">‹ ${isToday ? "Yesterday" : "Earlier"}</button>
        <button class="label" id="date-label">${prettyDate(date)}<span class="chev">⌄</span></button>
        <button id="next-day" ${isToday ? "disabled" : ""}>Tomorrow ›</button>
      </div>

      <div class="section-label">Stats</div>
      <div class="stat-grid">
        <div class="cell"><div class="v">${data.voices.toLocaleString()}</div><div class="l">Voices</div></div>
        <div class="cell"><div class="v">${data.unique.toLocaleString()}</div><div class="l">Unique words</div></div>
        <div class="cell"><div class="v">${data.said_once.toLocaleString()}</div><div class="l">Said only once</div></div>
        <div class="cell"><div class="v cobalt">${mostSaid || "—"}</div><div class="l">Most-said${mostSaidCount ? " · " + mostSaidCount + "×" : ""}</div></div>
      </div>

      <div class="section-label">Top 10</div>
      <ul class="top-list">
        ${top10.map(([w, c], i) => `
          <li>
            <span class="rank">${String(i + 1).padStart(2, "0")}</span>
            <span class="word">${w}</span>
            <span class="n">${c}<span class="x">×</span></span>
          </li>
        `).join("")}
      </ul>
      <button class="see-all-link" id="see-all">See all ${data.entries.length} words →</button>

      ${insightHTML ? '<div class="section-label">Insight</div>' + insightHTML : ""}

      ${showAllWords ? `
        <div class="section-label" style="margin-top:32px">All ${data.entries.length} words</div>
        <div class="all-words">
          ${data.entries.map(([w, c]) => `<div class="row"><span class="w">${w}</span><span class="n">${c}×</span></div>`).join("")}
        </div>
      ` : ""}
    `;

    document.getElementById("prev-day").addEventListener("click", () => {
      historyDate = (() => {
        const [y, m, d] = historyDate.split("-").map(Number);
        const dt = new Date(Date.UTC(y, m - 1, d));
        dt.setUTCDate(dt.getUTCDate() - 1);
        return dt.toISOString().slice(0, 10);
      })();
      renderHistorySingle();
    });
    if (!isToday) {
      document.getElementById("next-day").addEventListener("click", () => {
        historyDate = (() => {
          const [y, m, d] = historyDate.split("-").map(Number);
          const dt = new Date(Date.UTC(y, m - 1, d));
          dt.setUTCDate(dt.getUTCDate() + 1);
          return dt.toISOString().slice(0, 10);
        })();
        renderHistorySingle();
      });
    }
    document.getElementById("date-label").addEventListener("click", () => {
      // simple native date picker fallback
      const inp = document.createElement("input");
      inp.type = "date";
      inp.max = todayUTC();
      inp.value = historyDate;
      inp.style.cssText = "position:fixed; left:-9999px;";
      document.body.appendChild(inp);
      inp.addEventListener("change", () => {
        if (inp.value) { historyDate = inp.value; renderHistorySingle(); }
        inp.remove();
      });
      inp.click();
    });
    document.getElementById("see-all").addEventListener("click", () => renderHistorySingle(true));
  }

  async function renderHistoryWeek() {
    const { byDay } = await fetchLastDays(7);
    const days = [];
    for (let i = 0; i < 7; i++) {
      const date = isoDayBack(i);
      const d = byDay.get(date);
      const top = d ? [...d.counts.entries()].sort((a, b) => b[1] - a[1])[0] : null;
      days.push({ date, voices: d ? d.voices : 0, top });
    }
    // most frequent top word across days
    const winnerMap = new Map();
    for (const d of days) if (d.top) winnerMap.set(d.top[0], (winnerMap.get(d.top[0]) || 0) + 1);
    const winner = [...winnerMap.entries()].sort((a, b) => b[1] - a[1])[0];

    historyBody.innerHTML = `
      <div class="section-label" style="margin-top:24px">Top word, each day</div>
      <ul class="day-list">
        ${days.map(d => `
          <li>
            <span class="day">${dayLabel(d.date)}</span>
            <span class="date">${shortDate(d.date)}</span>
            <span class="word">${d.top ? d.top[0] : "—"}</span>
            <span class="n">${d.top ? d.top[1] : 0}<span class="x">×</span></span>
          </li>
        `).join("")}
      </ul>
      ${winner ? `
        <div class="insight" style="margin-top:24px">
          <div class="text"><span class="v">${winner[0]}</span> won ${winner[1]} of the last 7 days.</div>
        </div>
      ` : ""}
    `;
  }

  /* — New-day — */
  document.getElementById("new-day-refresh").addEventListener("click", () => location.reload());

  /* — Polling — */
  let pollT = null;
  function startPolling() {
    if (pollT) return;
    pollT = setInterval(() => { if (!document.hidden) refresh(); }, POLL_INTERVAL_MS);
  }
  document.addEventListener("visibilitychange", () => { if (!document.hidden) refresh(); });

  /* — Dev panel — */
  const devParam = new URLSearchParams(location.search).get("dev");
  if (devParam === "1") localStorage.setItem("mote.dev", "1");
  if (devParam === "0") localStorage.removeItem("mote.dev");
  const devOn = localStorage.getItem("mote.dev") === "1";
  if (devOn) {
    document.getElementById("dev-panel").classList.add("show");
    document.getElementById("dev-reset").addEventListener("click", () => {
      clearMine();
      localStorage.setItem("mote.device", crypto.randomUUID());
      location.reload();
    });
    function freshWord() {
      const cons = "bcdfghjklmnpqrstvwxyz", vow = "aeiou";
      const len = 4 + Math.floor(Math.random() * 3);
      let s = "";
      for (let i = 0; i < len; i++) s += (i % 2 === 0 ? cons : vow)[Math.floor(Math.random() * (i % 2 === 0 ? cons.length : vow.length))];
      return s;
    }
    async function devInsert(word) {
      await fetch(`${SUPABASE_URL}/rest/v1/words`, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ word, device_id: "seed-" + crypto.randomUUID() })
      });
    }
    document.getElementById("dev-drop").addEventListener("click", async () => {
      const w = freshWord();
      const n = 20 + Math.floor(Math.random() * 30);
      await Promise.all(Array.from({ length: n }, () => devInsert(w)));
      await refresh(w);
    });
    let dripT = null;
    const dripBtn = document.getElementById("dev-drip");
    dripBtn.addEventListener("click", () => {
      if (dripT) {
        clearInterval(dripT); dripT = null;
        dripBtn.classList.remove("on");
        dripBtn.textContent = "Toggle drip";
      } else {
        dripT = setInterval(() => document.getElementById("dev-drop").click(), 4000);
        dripBtn.classList.add("on");
        dripBtn.textContent = "Stop drip";
      }
    });
    document.getElementById("dev-early").addEventListener("click", (e) => {
      earlyOverride = earlyOverride === "force" ? false : "force";
      e.target.classList.toggle("on", earlyOverride === "force");
      refresh();
    });
  }

  /* — Boot — */
  refresh().then(() => runTyperCycle());
  startPolling();
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { clearCanvas(); refresh(); });
  }
  let resizeT = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => { clearCanvas(); refresh(); }, 250);
  });
</script>
</body>
